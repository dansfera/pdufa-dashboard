<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f33;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c9b1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)" />

  <!-- Decorative grid lines -->
  <line x1="0" y1="120" x2="1200" y2="120" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="360" x2="1200" y2="360" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="480" x2="1200" y2="480" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Pill icon -->
  <text x="80" y="220" font-family="system-ui, sans-serif" font-size="96" fill="#00c9b1" opacity="0.9">💊</text>

  <!-- Main headline -->
  <text x="80" y="310" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-1">Biotech Catalyst Calendar</text>

  <!-- Subtitle -->
  <text x="80" y="380" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="400" fill="#94a3b8">FDA PDUFA Dates · AdCom · Trial Readouts · Earnings</text>

  <!-- Accent divider -->
  <rect x="80" y="415" width="120" height="4" rx="2" fill="url(#accent)" />

  <!-- Author line -->
  <text x="80" y="480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="600" fill="#00c9b1">Dan Sfera</text>
  <text x="210" y="480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#64748b"> · 20+ years in clinical trials</text>

  <!-- Domain badge -->
  <rect x="80" y="525" width="220" height="48" rx="8" fill="#00c9b1" fill-opacity="0.12" stroke="#00c9b1" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="190" y="556" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#00c9b1" text-anchor="middle">dansfera.com</text>

  <!-- Right side: stat boxes -->
  <rect x="780" y="200" width="340" height="80" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="950" y="230" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#64748b" text-anchor="middle" letter-spacing="2">UPCOMING CATALYSTS</text>
  <text x="950" y="268" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle">56+</text>

  <rect x="780" y="300" width="340" height="80" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="950" y="330" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#64748b" text-anchor="middle" letter-spacing="2">DATA UPDATED</text>
  <text x="950" y="368" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#00c9b1" text-anchor="middle">Daily</text>

  <rect x="780" y="400" width="340" height="80" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="950" y="430" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#64748b" text-anchor="middle" letter-spacing="2">FREE ACCESS</text>
  <text x="950" y="468" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle">Always</text>
</svg>
